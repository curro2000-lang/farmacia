<!DOCTYPE html>
<html lang="es">
<head>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmacia · Productos Naturales</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde: #2d5a27;
            --verde-medio: #4a7c42;
            --verde-claro: #7ab648;
            --crema: #f7f3ec;
            --crema-oscuro: #ede8de;
            --tierra: #8b6914;
            --tierra-claro: #c4973a;
            --blanco: #ffffff;
            --gris: #6b7280;
            --texto: #1a2e17;
            --sombra: 0 4px 24px rgba(45,90,39,0.10);
            --sombra-card: 0 2px 12px rgba(45,90,39,0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--crema);
            color: var(--texto);
            min-height: 100vh;
        }

        /* HEADER CORREGIDO */
        header {
            background: var(--verde);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 80px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.15);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
    display: flex;
    align-items: center;
    gap: 15px; /* Espacio entre el logo y el texto */
    height: 100%;
}

.logo-img {
    max-height: 55px;
    width: auto;
    display: block;
    object-fit: contain;
}

.logo-text-side {
    font-family: 'Playfair Display', serif;
    color: var(--crema);
    font-size: 1.4rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    white-space: nowrap; /* Evita que el texto se parta en dos líneas */
}

/* Ajuste para móviles: ocultar el texto si no hay espacio */
@media (max-width: 768px) {
    .logo-text-side {
        font-size: 1.1rem;
    }
}

@media (max-width: 480px) {
    .logo-text-side {
        display: none; /* En pantallas muy pequeñas ocultamos el texto para no pisar los botones */
    }
}

        .header-actions {
            display: flex; 
            gap: 0.75rem; 
            align-items: center;
        }

        /* MAIN LAYOUT */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
            z-index: 1;
        }

        /* BOTONES */
        .btn {
            padding: 0.5rem 1.1rem;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .btn-outline {
            background: transparent;
            color: var(--crema);
            border: 1.5px solid rgba(247,243,236,0.4);
        }
        .btn-outline:hover { background: rgba(247,243,236,0.1); border-color: var(--crema); }

        .btn-primary {
            background: var(--verde-claro);
            color: var(--blanco);
        }
        .btn-primary:hover { background: #8cc754; transform: translateY(-1px); }

        /* TABS */
        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            background: var(--crema-oscuro);
            padding: 0.35rem;
            border-radius: 12px;
            width: fit-content;
        }

        .tab {
            padding: 0.55rem 1.4rem;
            border-radius: 9px;
            border: none;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            background: transparent;
            color: var(--gris);
        }

        .tab.active {
            background: var(--verde);
            color: var(--crema);
            box-shadow: var(--sombra-card);
        }

        /* SEARCH PANEL */
        .search-hero {
            background: linear-gradient(135deg, var(--verde) 0%, var(--verde-medio) 100%);
            border-radius: 20px;
            padding: 2.5rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .search-hero h1 {
            font-family: 'Playfair Display', serif;
            color: var(--crema);
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .search-hero p {
            color: rgba(247,243,236,0.7);
            font-size: 0.92rem;
            margin-bottom: 1.5rem;
        }

        .search-input-wrap {
            flex: 1;
            min-width: 240px;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 1rem; top: 50%;
            transform: translateY(-50%);
            color: var(--verde-medio);
        }

        .search-input {
            width: 100%;
            padding: 0.85rem 1rem 0.85rem 2.8rem;
            border-radius: 12px;
            border: none;
            outline: none;
        }

        /* CHIPS & GRID */
        .chips-container { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 2rem; }
        .chip { padding: 0.45rem 1rem; border-radius: 50px; border: 1.5px solid var(--crema-oscuro); background: var(--blanco); cursor: pointer; font-size: 0.83rem; color: var(--gris); }
        .chip.active { background: var(--verde); color: var(--crema); border-color: var(--verde); }
        
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.25rem; }
        
        .product-card { background: var(--blanco); border-radius: 16px; overflow: hidden; box-shadow: var(--sombra-card); transition: all 0.25s; border: 1.5px solid transparent; cursor: pointer; }
        .product-card:hover { transform: translateY(-3px); box-shadow: var(--sombra); border-color: var(--verde-claro); }

        .card-top { background: linear-gradient(135deg, var(--crema) 0%, #e8f5e1 100%); padding: 1.2rem 1.4rem 1rem; display: flex; align-items: flex-start; gap: 1rem; border-bottom: 1px solid var(--crema-oscuro); }
        .product-emoji { font-size: 2rem; width: 52px; height: 52px; background: var(--blanco); border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .product-name { font-family: 'Playfair Display', serif; font-size: 1rem; font-weight: 600; color: var(--texto); line-height: 1.3; }
        
        .stock-badge { font-size: 0.72rem; padding: 0.2rem 0.55rem; border-radius: 50px; font-weight: 600; margin-top: 0.3rem; display: inline-block; }
        .stock-ok { background: #dcf5dc; color: #1a7a1a; }
        .stock-low { background: #fff3cd; color: #856404; }
        .stock-out { background: #ffe0e0; color: #c0392b; }

        .card-body { padding: 1rem 1.4rem; }
        .card-desc { font-size: 0.83rem; color: var(--gris); line-height: 1.5; margin-bottom: 0.85rem; }
        .path-tag { font-size: 0.72rem; padding: 0.22rem 0.6rem; background: rgba(122,182,72,0.12); color: var(--verde-medio); border-radius: 50px; margin-right: 4px; }
        
        .price { font-size: 1.05rem; font-weight: 600; color: var(--verde); font-family: 'Playfair Display', serif; }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(26,46,23,0.5); z-index: 2000; padding: 1.5rem; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--blanco); border-radius: 20px; max-width: 600px; width: 100%; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .modal-header { background: linear-gradient(135deg, var(--verde), var(--verde-medio)); padding: 1.5rem; border-radius: 20px 20px 0 0; display: flex; justify-content: space-between; color: white; }

        /* STATS */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1rem; }
        .stat-card { background: var(--blanco); border-radius: 14px; padding: 1.25rem 1.4rem; box-shadow: var(--sombra-card); display: flex; align-items: center; gap: 1rem; }
        .stat-num { font-family: 'Playfair Display', serif; font-size: 1.7rem; color: var(--verde); font-weight: 700; }

        @media (max-width: 600px) {
            header { padding: 0 1rem; height: 70px; }
            .logo-img { max-height: 40px; }
            .header-actions .btn:first-child { display: none; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="logofarmacia.png" alt="Logo Farmacia" class="logo-img">
        <span class="logo-text-side">Productos Naturales</span>
    </div>
    <div class="header-actions">
        <button class="btn btn-outline" onclick="triggerExcelImport()">📥 Importar</button>
        <input type="file" id="excelFileInput" accept=".xlsx,.xls" style="display:none" onchange="handleExcelFile(event)">
        <button class="btn btn-outline" onclick="switchTab('estadisticas')">📊 Stats</button>
        <button class="btn btn-primary" onclick="openAddModal()">+ Nuevo</button>
    </div>
</header>

<div class="container">
    <div class="tabs">
        <button class="tab active" onclick="switchTab('buscar')">🔍 Buscar</button>
        <button class="tab" onclick="switchTab('todos')">📦 Todos</button>
        <button class="tab" onclick="switchTab('estadisticas')">📊 Estadísticas</button>
    </div>

    <div id="tab-buscar">
        <div class="search-hero">
            <h1>Buscar por patología</h1>
            <p>Encuentra productos naturales indicados para cada condición</p>
            <div class="search-input-wrap">
                <span class="search-icon">🔍</span>
                <input class="search-input" id="searchInput" type="text" placeholder="¿Qué buscas?..." oninput="onSearch()">
            </div>
        </div>
        <div class="chips-container" id="chipsContainer"></div>
        <div id="resultsGrid" class="products-grid"></div>
    </div>

    <div id="tab-todos" style="display:none">
        <div id="allGrid" class="products-grid"></div>
    </div>

    <div id="tab-estadisticas" style="display:none">
        <div class="stats-grid" id="statsGrid"></div>
        <div id="topPatologies" class="chips-container" style="margin-top:2rem"></div>
    </div>
</div>

<!-- MODAL VER -->
<div class="modal-overlay" id="viewModal">
    <div class="modal">
        <div class="modal-header">
            <div id="modalName" style="font-size:1.3rem; font-weight:600"></div>
            <button onclick="closeModal('viewModal')" style="background:none; border:none; color:white; cursor:pointer">✕</button>
        </div>
        <div class="modal-body" style="padding:1.5rem">
            <p id="modalDesc" style="margin-bottom:1rem"></p>
            <div id="modalPaths" style="margin-bottom:1rem"></div>
            <div style="border-top:1px solid #eee; padding-top:1rem; display:flex; justify-content:space-between">
                <div id="modalPrice" class="price" style="font-size:1.5rem"></div>
                <button class="btn btn-primary" onclick="editFromView()">Editar</button>
            </div>
        </div>
    </div>
</div>

<!-- MODAL IMPORTAR -->
<div class="modal-overlay" id="importModal">
    <div class="modal" style="max-width:500px">
        <div class="modal-header"><h3>Importar Excel</h3></div>
        <div class="modal-body" style="padding:1.5rem">
            <div id="importEmpty" style="text-align:center">
                <button class="btn btn-primary" onclick="document.getElementById('excelFileInput').click()">Seleccionar Archivo</button>
            </div>
            <div id="importPreview" style="display:none">
                <p id="importSummary" style="font-weight:600; color:green; margin-bottom:1rem"></p>
                <div style="margin-bottom:1rem">
                    <label><input type="radio" name="importMode" value="add" checked> Añadir</label><br>
                    <label><input type="radio" name="importMode" value="replace"> Reemplazar todo</label>
                </div>
                <button class="btn btn-primary" onclick="confirmImport()">Confirmar</button>
            </div>
        </div>
    </div>
</div>

<script>
let products = [];
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyTCYLqoKQtaHZlZrAdM9bO9mhUa3Yczo6vlLFvgpU9cL_lvzM2FUKqRs6w_Rd9w_ll5A/exec";
let activeChip = null;

// CARGA INICIAL
async function loadFromSheet() {
    try {
        const response = await fetch(SCRIPT_URL);
        const data = await response.json();
        if (data && data.length > 0) {
            products = data;
        } else {
            products = []; // O SAMPLE_PRODUCTS si quieres datos de ejemplo
        }
    } catch (e) {
        console.error("Error:", e);
        products = JSON.parse(localStorage.getItem('farmaProducts')) || [];
    }
    refreshUI();
}

async function save() {
    localStorage.setItem('farmaProducts', JSON.stringify(products));
    fetch(SCRIPT_URL, {
        method: "POST",
        mode: 'no-cors',
        body: JSON.stringify(products)
    });
}

function refreshUI() {
    buildChips();
    renderResults();
    renderAll();
    renderStats();
}

// LÓGICA DE INTERFAZ
function buildChips() {
    const counts = {};
    products.forEach(p => p.pathologies.forEach(path => counts[path] = (counts[path] || 0) + 1));
    const paths = Object.entries(counts).sort((a,b) => b[1]-a[1]).map(e => e[0]);
    
    document.getElementById('chipsContainer').innerHTML = paths.map(p => `
        <button class="chip ${activeChip===p?'active':''}" onclick="selectChip('${p}')">${p}</button>
    `).join('');
}

function selectChip(path) {
    activeChip = activeChip === path ? null : path;
    document.getElementById('searchInput').value = activeChip || '';
    refreshUI();
}

function onSearch() {
    activeChip = null;
    refreshUI();
}

function renderResults() {
    const query = document.getElementById('searchInput').value.toLowerCase().trim();
    const filtered = products.filter(p => 
        p.name.toLowerCase().includes(query) || 
        p.pathologies.some(path => path.toLowerCase().includes(query))
    );
    document.getElementById('resultsGrid').innerHTML = filtered.map(p => renderCard(p)).join('');
}

function renderAll() {
    document.getElementById('allGrid').innerHTML = products.map(p => renderCard(p)).join('');
}

function renderCard(p) {
    return `
    <div class="product-card" onclick="viewProduct(${p.id})">
        <div class="card-top">
            <div class="product-emoji">${p.emoji || '🌿'}</div>
            <div>
                <div class="product-name">${p.name}</div>
                <div style="font-size:0.7rem; color:gray">${p.brand}</div>
                <span class="stock-badge ${p.stock > 0 ? 'stock-ok' : 'stock-out'}">${p.stock > 0 ? 'En Stock' : 'Sin Stock'}</span>
            </div>
        </div>
        <div class="card-body">
            <div class="card-desc">${p.desc.substring(0, 80)}...</div>
            <div class="price">${parseFloat(p.price).toFixed(2)} €</div>
        </div>
    </div>`;
}

function viewProduct(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    document.getElementById('modalName').textContent = p.name;
    document.getElementById('modalDesc').textContent = p.desc;
    document.getElementById('modalPrice').textContent = parseFloat(p.price).toFixed(2) + ' €';
    document.getElementById('modalPaths').innerHTML = p.pathologies.map(pt => `<span class="path-tag">${pt}</span>`).join('');
    document.getElementById('viewModal').classList.add('open');
}

function closeModal(id) { document.getElementById(id).classList.remove('open'); }

function switchTab(name) {
    ['buscar','todos','estadisticas'].forEach(t => document.getElementById('tab-'+t).style.display = t===name ? 'block' : 'none');
    document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', t.innerText.toLowerCase().includes(name.substring(0,3))));
}

// EXCEL IMPORT
function triggerExcelImport() { document.getElementById('importModal').classList.add('open'); }

function handleExcelFile(e) {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(ev) {
        const wb = XLSX.read(ev.target.result, { type: 'array' });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws);
        pendingImport = rows.map((r, i) => ({
            id: Date.now() + i,
            name: r.Nombre || r.name || 'Sin nombre',
            brand: r.Marca || 'Genérico',
            price: r.Precio || 0,
            stock: r.Stock || 0,
            emoji: r.Emoji || '🌿',
            desc: r.Descripcion || '',
            pathologies: r.Patologias ? r.Patologias.split('|') : []
        }));
        document.getElementById('importEmpty').style.display = 'none';
        document.getElementById('importPreview').style.display = 'block';
        document.getElementById('importSummary').textContent = `Listo: ${pendingImport.length} productos`;
    };
    reader.readAsArrayBuffer(file);
}

function confirmImport() {
    const mode = document.querySelector('input[name="importMode"]:checked').value;
    products = mode === 'replace' ? pendingImport : [...products, ...pendingImport];
    save();
    closeModal('importModal');
    refreshUI();
    alert("¡Importado!");
}

function renderStats() {
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><div class="stat-num">${products.length}</div><div style="font-size:0.8rem">Productos</div></div>
        <div class="stat-card"><div class="stat-num">${products.filter(p=>p.stock<=0).length}</div><div style="font-size:0.8rem">Sin Stock</div></div>
    `;
}

// Único punto de inicio
window.onload = loadFromSheet;
</script>
</body>
</html>
